<iframe
  src="https://open.spotify.com/embed/track/{{ include.track_id }}?theme=0"
  width="100%"
  height="{{ include.height | default: 152 }}"
  frameBorder="0"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
  loading="lazy"
  class="spotify-embed"
></iframe>
