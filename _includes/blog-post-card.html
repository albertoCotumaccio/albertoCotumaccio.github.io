<div class="blog-post border rounded p-4 mb-4 lang-{{ post.lang }}" data-name="{{ post.name }}" style="display: none;">
  <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; flex-direction: row;">
    {% if post.thumbnail %}
    <div style="flex: 0 0 320px; max-width: 320px;">
      <img src="{{ post.thumbnail | relative_url }}"
           alt="Thumbnail"
           style="width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 8px;">
    </div>
    {% endif %}

    <div style="flex: 1 1 0; display: flex; flex-direction: column; justify-content: space-between;">
      <div>
        <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
        <p class="text-muted"><small>{{ post.date | date: "%B %d, %Y" }}{% if post.author %} • {{ post.author }}{% endif %}</small></p>
        <p>{{ post.excerpt }}</p>

        {% if post.tags %}
          <p class="mb-2"><strong>Tags:</strong> 
            {% for tag in post.tags %}
              <span class="badge skill-badge">{{ tag }}</span>
            {% endfor %}
          </p>
        {% endif %}
      </div>

      <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
        <a href="{{ post.url | relative_url }}" class="btn btn-dark" style="padding: 12px 24px; font-size: 1.3rem; border-radius: 6px;">
          Explore →
        </a>
      </div>
    </div>
  </div>
</div>
