<script>
(function() {
  // Carica le traduzioni dal JSON embedded
  const translationsData = JSON.parse(document.getElementById('translations-data').textContent);

  // Funzione per ottenere una traduzione da una chiave tipo "sections.skills"
  function getTranslation(key, lang) {
    const keys = key.split('.');
    let value = translationsData;
    for (const k of keys) {
      if (value && value[k]) {
        value = value[k];
      } else {
        return null;
      }
    }
    return value && value[lang] ? value[lang] : null;
  }

  // Applica le traduzioni a tutti gli elementi con data-i18n
  function applyTranslations(lang) {
    // Traduci contenuto testuale
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const translation = getTranslation(key, lang);
      if (translation) {
        el.textContent = translation;
      }
    });

    // Traduci contenuto HTML (per testi con link)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      const translation = getTranslation(key, lang);
      if (translation) {
        el.innerHTML = translation;
      }
    });

    // Traduci placeholder
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      const translation = getTranslation(key, lang);
      if (translation) {
        el.setAttribute('placeholder', translation);
      }
    });

    // Traduci attributi custom (formato: "attr:key,attr2:key2")
    document.querySelectorAll('[data-i18n-attr]').forEach(el => {
      const attrs = el.getAttribute('data-i18n-attr').split(',');
      attrs.forEach(pair => {
        const [attr, key] = pair.split(':');
        const translation = getTranslation(key.trim(), lang);
        if (translation) {
          el.setAttribute(attr.trim(), translation);
        }
      });
    });
  }

  // Gestione lingua con localStorage
  function getCurrentLanguage() {
    return localStorage.getItem('language') || '{{ site.language }}';
  }

  function setLanguage(lang) {
    localStorage.setItem('language', lang);
    applyTranslations(lang);

    // Aggiorna bottone lingua
    const langText = document.getElementById('langText');
    if (langText) {
      langText.textContent = lang === 'en' ? '🇬🇧 EN' : '🇮🇹 IT';
    }

    // Gestione elementi con classi lang-specific (legacy support per about)
    document.querySelectorAll('.title-it, .current-role-it').forEach(el => {
      el.style.display = lang === 'it' ? 'block' : 'none';
    });
    document.querySelectorAll('.title-en, .current-role-en').forEach(el => {
      el.style.display = lang === 'en' ? 'block' : 'none';
    });

    // Gestione post del blog
    const posts = document.querySelectorAll('.blog-post');
    const seenNames = new Set();
    posts.forEach(post => {
      const name = post.getAttribute('data-name');
      const postLang = post.classList.contains('lang-' + lang);
      if (!seenNames.has(name) && postLang) {
        post.style.display = 'block';
        seenNames.add(name);
      } else {
        post.style.display = 'none';
      }
    });
  }

  // Aggiorna testo del tema
  function updateThemeText(theme, lang) {
    const themeText = document.getElementById('themeText');
    if (themeText) {
      const key = theme === 'dark' ? 'labels.dark_theme' : 'labels.light_theme';
      const translation = getTranslation(key, lang);
      if (translation) {
        themeText.textContent = translation;
      }
    }
  }

  // Inizializzazione al caricamento DOM
  document.addEventListener('DOMContentLoaded', function() {
    const currentLang = getCurrentLanguage();
    setLanguage(currentLang);

    // Gestione click bottone lingua
    const langToggleButton = document.getElementById('langToggle');
    if (langToggleButton) {
      langToggleButton.addEventListener('click', () => {
        const currentLang = getCurrentLanguage();
        const newLang = currentLang === 'en' ? 'it' : 'en';

        // Per i post del blog con versioni separate per lingua
        const translationUrl = '{{ page.translation }}';
        if (translationUrl) {
          localStorage.setItem('language', newLang);
          window.location.href = translationUrl;
        } else {
          setLanguage(newLang);
        }
      });
    }

    // Gestione tema
    const themeToggleButton = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const currentTheme = localStorage.getItem('theme') || 'light';

    document.body.setAttribute('data-theme', currentTheme);
    updateThemeButton(currentTheme);
    updateThemeText(currentTheme, currentLang);

    if (themeToggleButton) {
      themeToggleButton.addEventListener('click', () => {
        const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton(newTheme);
        updateThemeText(newTheme, getCurrentLanguage());

        // Sincronizza con Giscus
        const iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
          iframe.contentWindow.postMessage({
            giscus: { setConfig: { theme: newTheme } }
          }, 'https://giscus.app');
        }
      });
    }

    function updateThemeButton(theme) {
      if (themeIcon) {
        if (theme === 'dark') {
          themeIcon.classList.replace('fa-sun', 'fa-moon');
        } else {
          themeIcon.classList.replace('fa-moon', 'fa-sun');
        }
      }
    }
  });

  // Esponi funzioni globali per uso esterno
  window.i18n = {
    getTranslation: getTranslation,
    getCurrentLanguage: getCurrentLanguage,
    setLanguage: setLanguage,
    applyTranslations: applyTranslations
  };
})();
</script>

<!-- Citations Counter Script -->
<script>
(function() {
  // Funzione per animare il conteggio
  function animateCount(element, targetNumber) {
    element.classList.add('animate');

    const duration = 1000;
    const steps = 20;
    const stepDuration = duration / steps;
    const increment = targetNumber / steps;
    let current = 0;
    let step = 0;

    const counter = setInterval(() => {
      step++;
      current = Math.min(Math.round(increment * step), targetNumber);
      element.textContent = current;

      if (step >= steps) {
        clearInterval(counter);
        element.textContent = targetNumber;
      }
    }, stepDuration);
  }

  // Funzione per recuperare citazioni da Semantic Scholar
  async function fetchCitationsFromSemanticScholar(doi) {
    try {
      const response = await fetch(`https://api.semanticscholar.org/graph/v1/paper/DOI:${doi}?fields=citationCount`);
      if (!response.ok) throw new Error('API error');
      const data = await response.json();
      return data.citationCount || null;
    } catch (error) {
      console.log('Semantic Scholar API not available, using fallback');
      return null;
    }
  }

  // Funzione per recuperare citazioni da OpenCitations
  async function fetchCitationsFromOpenCitations(doi) {
    try {
      const response = await fetch(`https://opencitations.net/index/coci/api/v1/citation-count/${doi}`);
      if (!response.ok) throw new Error('API error');
      const data = await response.json();
      return data[0]?.count || null;
    } catch (error) {
      console.log('OpenCitations API not available, using fallback');
      return null;
    }
  }

  // Inizializzazione al caricamento DOM
  document.addEventListener('DOMContentLoaded', async function() {
    const badge = document.getElementById('citations-badge');
    const countElement = document.getElementById('citations-count');

    if (!badge || !countElement) return;

    const doi = badge.getAttribute('data-doi');
    const fallback = parseInt(badge.getAttribute('data-fallback')) || 0;

    // Mostra stato di caricamento
    badge.classList.add('loading');
    countElement.textContent = '...';

    let citationCount = null;

    // Prova prima Semantic Scholar
    if (doi) {
      citationCount = await fetchCitationsFromSemanticScholar(doi);

      // Se Semantic Scholar fallisce, prova OpenCitations
      if (citationCount === null) {
        citationCount = await fetchCitationsFromOpenCitations(doi);
      }
    }

    // Usa il fallback se le API non rispondono
    const finalCount = citationCount !== null ? citationCount : fallback;

    // Rimuovi stato di caricamento e anima il numero
    badge.classList.remove('loading');
    animateCount(countElement, finalCount);

    // Salva in localStorage per cache (valido 24 ore)
    if (citationCount !== null) {
      localStorage.setItem('paper_citations', JSON.stringify({
        count: citationCount,
        timestamp: Date.now()
      }));
    }
  });
})();
</script>
