<!-- Meta Tags -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="{% if page.excerpt %}
  {{ page.excerpt | strip_html | truncate: 160 }}
{% else %}
  {{ site.description }}
{% endif %}" />
<meta name="author" content="{{ site.author }}" />

<!-- Favicon & Manifest -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">
<link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}" type="image/x-icon">

<!-- Title -->
<title>
  {% if page.layout == "post" %}
    {% assign meta = site.data.posts[page.name] %}
    {{ meta.title[page.lang] }}
  {% elsif page.layout == "default" %}
    Alberto Cotumaccio Website
  {% elsif page.title %}
    {{ page.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<!-- Stylesheets -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
<link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" />

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
