<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>
  {% if page.layout == "post" %}
    {% assign meta = site.data.posts[page.name] %}
    {{ meta.title[page.lang] }}
  {% elsif page.layout == "default" %}
    Alberto Cotumaccio Website
  {% elsif page.title %}
    {{ page.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<meta name="description"
      content="{% if page.excerpt %}
                 {{ page.excerpt | strip_html | truncate: 160 }}
               {% else %}
                 {{ site.description }}
               {% endif %}" />

<meta name="author" content="{{ site.author }}" />
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon" />

<link rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
<link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" />

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
