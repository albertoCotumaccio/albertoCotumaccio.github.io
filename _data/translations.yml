# -----------------------------------------------------------------------------
# HOBBIES / BEYOND WORK
# -----------------------------------------------------------------------------
hobbies:
  text:
    en: "Outside of work, you'll usually find me planning my next trip or getting lost in a new city. Traveling is how I recharge and find inspiration. I also spend a lot of time producing music, what started as a hobby has grown into something I deeply care about. If you're curious, <a href='/music/' class='hobbies-music-link'>check out some of my tracks</a>."
    it: "Fuori dal lavoro, di solito mi trovi a pianificare il prossimo viaggio o a perdermi in una nuova citta'. Viaggiare e' il mio modo per ricaricarmi e trovare ispirazione. Passo anche molto tempo a produrre musica, quello che e' iniziato come hobby e' diventato qualcosa a cui tengo profondamente. Se sei curioso, <a href='/music/' class='hobbies-music-link'>dai un'occhiata alle mie tracce</a>."
