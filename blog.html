---
layout: default
title: Blog
---

<h1 class="text-center"><strong>Blog</strong></h1>
<p id="blog-subtitle"
   class="text-center text-muted"
   data-en="{{ site.subtitle_blog.en | escape }}"
   data-it="{{ site.subtitle_blog.it | escape }}">
</p>

{% assign posts_by_name = site.posts | group_by: "name" %}

<div class="blog-container">
  {% for group in posts_by_name %}
    {% for post in group.items %}
      {% include blog-post-card.html post=post %}
    {% endfor %}
  {% endfor %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const lang = localStorage.getItem("language") || "en";
    const subtitle = document.getElementById("blog-subtitle");
    if (subtitle) {
      const fallback = subtitle.dataset.en;
      subtitle.textContent = subtitle.dataset[lang] || fallback;
    }
  });
</script>
