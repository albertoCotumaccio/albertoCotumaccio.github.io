---
layout: default
title: Blog
---

<h1 class="text-center"><strong data-i18n="sections.blog">Blog</strong></h1>
<p id="blog-subtitle" class="text-center text-muted" data-i18n="blog.subtitle"></p>

{% assign posts_by_name = site.posts | group_by: "name" %}

<div class="blog-container">
  {% for group in posts_by_name %}
    {% for post in group.items %}
      {% include blog-post-card.html post=post %}
    {% endfor %}
  {% endfor %}
</div>
